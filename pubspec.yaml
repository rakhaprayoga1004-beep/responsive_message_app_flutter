name: responsive_message_app_flutter
description: A Flutter project for SMKN 12 Jakarta.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  window_manager: ^0.4.3
  flutter:
    sdk: flutter
  
  # UI dan Utility
  charts_flutter: ^0.12.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  intl: ^0.17.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  file_picker: ^8.3.0
  image_picker: ^1.1.2           # ✅ UPDATE (dari 1.0.5)
  flutter_spinkit: ^5.2.1
  shared_preferences: ^2.5.4     # ✅ SUDAH OK
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.3       # ✅ UPDATE (dari 5.0.2)
  share_plus: ^10.1.0             # ✅ UPDATE (dari 7.2.1)
  cross_file: ^0.3.4+1
  universal_platform: ^1.1.0
  permission_handler: ^12.0.0     # ✅ UPDATE (dari 11.0.0)
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  photo_view: ^0.15.0
  flutter_local_notifications: ^18.0.1  # ✅ UPDATE (dari 21.0.0 ke versi stabil)
  # firebase_messaging: ^15.2.0
  path: ^1.9.1
  
  # Networking dan API
  http: ^1.3.0
  
  # State Management
  provider: ^6.1.2
  
  # Chart
  fl_chart: ^0.70.2
  
  # Image
  cached_network_image: ^3.4.1
  
  # Add qr_flutter for QR Code
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0          # ✅ UPDATE (dari 3.0.1)

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/